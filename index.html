<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
padding:10px;
}

button{
width:100%;
padding:18px;
margin:10px 0;
background:#222;
color:white;
border:2px solid #555;
font-size:20px;
}

input{
background:#111;
color:white;
border:1px solid #555;
padding:8px;
font-size:18px;
}

.checkgrande{
width:40px;
height:40px;
margin-right:10px;
}

.checklabel{
font-size:22px;
margin-right:30px;
}

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th{
border-bottom:2px solid #555;
padding:10px;
font-size:20px;
}

td{
padding:6px;
}

.cantidad{
width:80px;
font-size:20px;
}

.articulo{
width:400px;
font-size:20px;
}

.precio{
width:120px;
font-size:20px;
}

.iva{
width:80px;
font-size:20px;
}

.total{
width:120px;
font-size:20px;
}

.incidenciaCol{
width:150px;
text-align:center;
}

.firma{
width:300px;
height:80px;
background:#111;
border:2px solid #555;
}

.panel{
margin-top:10px;
padding:10px;
background:#111;
}

</style>

<script>

function crearFilas(){

const tabla=document.getElementById("tabla");

tabla.innerHTML="";

for(let i=0;i<15;i++){

tabla.innerHTML+=`

<tr>

<td><input class="cantidad" oninput="calcular()"></td>

<td><input class="articulo"></td>

<td><input class="precio" oninput="calcular()"></td>

<td><input class="iva" value="21" oninput="calcular()"></td>

<td class="total">0.00</td>

<td class="incidenciaCol">
<input type="checkbox" class="checkgrande">
</td>

<td>
<div class="firma"></div>
</td>

</tr>

`;

}

}

function calcular(){

let subtotal=0;
let ivaTotal=0;

const filas=document.querySelectorAll("#tabla tr");

filas.forEach(fila=>{

const cantidad=fila.querySelector(".cantidad").value||0;
const precio=fila.querySelector(".precio").value||0;
const iva=fila.querySelector(".iva").value||0;

const total=cantidad*precio;

fila.querySelector(".total").innerText=total.toFixed(2);

subtotal+=total;
ivaTotal+=total*(iva/100);

});

document.getElementById("subtotal").innerText=subtotal.toFixed(2);
document.getElementById("ivatotal").innerText=ivaTotal.toFixed(2);
document.getElementById("totalfinal").innerText=(subtotal+ivaTotal).toFixed(2);

}

function guardarPedido(){

alert("PEDIDO GUARDADO");

}

window.onload=function(){

crearFilas();

}

</script>

</head>

<body>

<h1>MONOLITO GPT PRO</h1>

<div class="panel">

<label class="checklabel">
<input type="checkbox" class="checkgrande"> INCIDENCIA
</label>

<label class="checklabel">
<input type="checkbox" class="checkgrande"> PAGADO
</label>

</div>

<table>

<thead>

<tr>

<th>Pido</th>
<th>Artículo</th>
<th>Precio</th>
<th>IVA</th>
<th>Total</th>
<th>Incidencia</th>
<th>Firma proveedor</th>

</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

<div class="panel">

Subtotal: <span id="subtotal">0.00</span><br>
IVA: <span id="ivatotal">0.00</span><br>
TOTAL: <span id="totalfinal">0.00</span>

</div>

<button onclick="guardarPedido()">
GUARDAR PEDIDO
</button>

</body>
</html>
