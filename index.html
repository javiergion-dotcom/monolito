<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",
authDomain: "monolito-ed87d.firebaseapp.com",
projectId: "monolito-ed87d",
storageBucket: "monolito-ed87d.firebasestorage.app",
messagingSenderId: "737849584362",
appId: "1:737849584362:web:bdb3b3b9fd65425dcf8593"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* TABLA CAMAREROS */

const camareros = {

"475":"JAVI",
"312":"MARCOS",
"128":"ANA",
"901":"LUIS"

};


/* AUTOCOMPLETAR CAMARERO */

window.buscarCamarero = function(){

const codigo = document.getElementById("codigoCamarero").value.trim();

const nombre = camareros[codigo] || "";

document.getElementById("nombreCamarero").value = nombre;

}


/* CARGAR PROVEEDORES EN LISTA */

window.cargarListaProveedores = async function(){

const select = document.getElementById("proveedorPedido");

select.innerHTML = "";

const querySnapshot = await getDocs(collection(db,"proveedores"));

querySnapshot.forEach(doc=>{

const data = doc.data();

const option = document.createElement("option");

option.value = data.nombre;
option.textContent = data.nombre;

select.appendChild(option);

});

}


/* GUARDAR PEDIDO */

window.guardarPedido = async function(){

const proveedor = document.getElementById("proveedorPedido").value;
const camarero = document.getElementById("nombreCamarero").value;
const fecha = new Date().toISOString();

await addDoc(collection(db,"pedidos"),{

proveedor: proveedor,
camarero: camarero,
fecha: fecha

});

alert("Pedido guardado");

}


/* PROVEEDORES */

window.guardarProveedor = async function(){

const nombre = document.getElementById("nombreProveedor").value.trim();
const telefono = document.getElementById("telefonoProveedor").value.trim();
const pago = document.getElementById("formaPago").value.trim();
const diaPedido = document.getElementById("diaPedido").value.trim();
const diaReparto = document.getElementById("diaReparto").value.trim();

if(nombre=="") return;

await addDoc(collection(db,"proveedores"),{

nombre,
telefono,
formaPago:pago,
diaPedido,
diaReparto,
fecha:new Date().toISOString()

});

cargarProveedores();

}


window.cargarProveedores = async function(){

const lista = document.getElementById("listaProveedores");

lista.innerHTML="";

const querySnapshot = await getDocs(collection(db,"proveedores"));

querySnapshot.forEach(doc=>{

const data = doc.data();

lista.innerHTML+=`

<div class="item">

<strong>${data.nombre}</strong><br>

Pago: ${data.formaPago}<br>

Pedido: ${data.diaPedido}<br>

Reparto: ${data.diaReparto}

</div>

`;

});

}


/* NAVEGACION */

window.ir = function(panel){

document.getElementById("principal").style.display="none";
document.getElementById("proveedores").style.display="none";
document.getElementById("pedidos").style.display="none";

document.getElementById(panel).style.display="block";

if(panel=="proveedores") cargarProveedores();
if(panel=="pedidos") cargarListaProveedores();

}

</script>


<style>

body{

background:black;
color:white;
font-family:Arial;
padding:20px;

}

button{

width:100%;
padding:15px;
margin:6px 0;
background:#1a1a1a;
color:white;
border:1px solid #444;
border-radius:6px;
font-size:16px;

}

input,select{

width:100%;
padding:10px;
margin:4px 0;
background:#111;
color:white;
border:1px solid #333;

}

.item{

background:#111;
padding:10px;
margin-top:5px;
border-radius:6px;

}

</style>

</head>

<body>


<div id="principal">

<h1>MONOLITO GPT PRO</h1>

<button onclick="ir('pedidos')">PEDIDOS</button>

<button onclick="ir('proveedores')">PROVEEDORES</button>

</div>



<div id="pedidos" style="display:none">

<button onclick="ir('principal')">← VOLVER</button>

<h2>NUEVO PEDIDO</h2>

<label>Código camarero</label>

<input id="codigoCamarero" oninput="buscarCamarero()">

<label>Nombre camarero</label>

<input id="nombreCamarero" readonly>

<label>Proveedor</label>

<select id="proveedorPedido"></select>

<button onclick="guardarPedido()">GUARDAR PEDIDO</button>

</div>



<div id="proveedores" style="display:none">

<button onclick="ir('principal')">← VOLVER</button>

<h2>PROVEEDORES</h2>

<input id="nombreProveedor" placeholder="Nombre proveedor">

<input id="telefonoProveedor" placeholder="Teléfono">

<input id="formaPago" placeholder="Forma de pago">

<input id="diaPedido" placeholder="Día de pedido">

<input id="diaReparto" placeholder="Día de reparto">

<button onclick="guardarProveedor()">GUARDAR</button>

<div id="listaProveedores"></div>

</div>


</body>
</html>
