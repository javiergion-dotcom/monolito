<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
padding:10px;
}

/* BARRA SUPERIOR */

.barraSuperior{
display:flex;
align-items:center;
gap:60px;
background:#111;
padding:20px;
}

/* PAGADO VERDE */

.checkPagado{
width:45px;
height:45px;
accent-color:#00ff00;
}

.labelPagado{
font-size:26px;
color:#00ff00;
}

/* INCIDENCIA ROJO */

.checkIncidencia{
width:45px;
height:45px;
accent-color:#ff0000;
}

.labelIncidencia{
font-size:26px;
color:#ff0000;
}

/* TABLA */

table{
width:100%;
margin-top:10px;
border-collapse:collapse;
}

th{
border-bottom:2px solid #555;
padding:10px;
font-size:20px;
}

td{
padding:6px;
}

.cantidad{
width:80px;
font-size:20px;
}

.articulo{
width:400px;
font-size:20px;
}

.precio{
width:120px;
font-size:20px;
}

.iva{
width:80px;
font-size:20px;
}

.total{
width:120px;
font-size:20px;
}

.checkFila{
width:35px;
height:35px;
accent-color:#ff0000;
}

.firma{
width:300px;
height:80px;
background:#111;
border:2px solid #00aaff;
}

/* PANEL TOTAL */

.panel{
margin-top:10px;
padding:10px;
background:#111;
font-size:24px;
}

/* BOTON */

button{
width:100%;
padding:20px;
margin-top:10px;
background:#003300;
color:white;
border:2px solid #00ff00;
font-size:26px;
}

</style>

<script>

function crearFilas(){

const tabla=document.getElementById("tabla");

tabla.innerHTML="";

for(let i=0;i<15;i++){

tabla.innerHTML+=`

<tr>

<td><input class="cantidad" oninput="calcular()"></td>

<td><input class="articulo"></td>

<td><input class="precio" oninput="calcular()"></td>

<td><input class="iva" value="21" oninput="calcular()"></td>

<td class="total">0.00</td>

<td><input type="checkbox" class="checkFila"></td>

<td><div class="firma"></div></td>

</tr>

`;

}

}

function calcular(){

let subtotal=0;
let ivaTotal=0;

const filas=document.querySelectorAll("#tabla tr");

filas.forEach(fila=>{

const cantidad=fila.querySelector(".cantidad").value||0;
const precio=fila.querySelector(".precio").value||0;
const iva=fila.querySelector(".iva").value||0;

const total=cantidad*precio;

fila.querySelector(".total").innerText=total.toFixed(2);

subtotal+=total;
ivaTotal+=total*(iva/100);

});

document.getElementById("subtotal").innerText=subtotal.toFixed(2);
document.getElementById("ivatotal").innerText=ivaTotal.toFixed(2);
document.getElementById("totalfinal").innerText=(subtotal+ivaTotal).toFixed(2);

}

function guardarPedido(){

alert("PEDIDO GUARDADO");

}

window.onload=function(){

crearFilas();

}

</script>

</head>

<body>

<h1>MONOLITO GPT PRO</h1>

<div class="barraSuperior">

<label class="labelPagado">
<input type="checkbox" class="checkPagado">
PAGADO
</label>

<label class="labelIncidencia">
<input type="checkbox" class="checkIncidencia">
INCIDENCIA
</label>

</div>

<table>

<thead>

<tr>

<th>Pido</th>
<th>Artículo</th>
<th>Precio</th>
<th>IVA</th>
<th>Total</th>
<th>Incidencia</th>
<th>Firma proveedor</th>

</tr>

</thead>

<tbody id="tabla"></tbody>

</table>

<div class="panel">

Subtotal: <span id="subtotal">0.00</span><br>
IVA: <span id="ivatotal">0.00</span><br>
TOTAL: <span id="totalfinal">0.00</span>

</div>

<button onclick="guardarPedido()">
GUARDAR PEDIDO
</button>

</body>
</html>
