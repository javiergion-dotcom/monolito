<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",
authDomain: "monolito-ed87d.firebaseapp.com",
projectId: "monolito-ed87d",
storageBucket: "monolito-ed87d.firebasestorage.app",
messagingSenderId: "737849584362",
appId: "1:737849584362:web:bdb3b3b9fd65425dcf8593"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* CAMAREROS */

const camareros = {
"475":"JAVI",
"312":"MARCOS",
"128":"ANA",
"901":"LUIS"
};

window.buscarCamarero = function(){
const codigo = document.getElementById("codigoCamarero").value.trim();
document.getElementById("nombreCamarero").value = camareros[codigo] || "";
}

/* FECHA Y HORA */

window.actualizarFechaHora = function(){

const ahora = new Date();

document.getElementById("fecha").value =
ahora.toLocaleDateString();

document.getElementById("hora").value =
ahora.toLocaleTimeString();

}

/* CARGAR PROVEEDORES */

window.cargarListaProveedores = async function(){

const select = document.getElementById("proveedorPedido");

select.innerHTML="";

const snap = await getDocs(collection(db,"proveedores"));

snap.forEach(doc=>{

const data=doc.data();

const option=document.createElement("option");

option.value=data.nombre;
option.textContent=data.nombre;

select.appendChild(option);

});

}

/* CREAR TABLA PEDIDO */

window.crearTabla = function(){

const tabla=document.getElementById("tablaPedido");

tabla.innerHTML="";

for(let i=0;i<25;i++){

tabla.innerHTML+=`
<tr>

<td>
<input type="number" class="pido" oninput="calcularFila(this)">
</td>

<td>
<input type="text">
</td>

<td>
<input type="number" class="precio" oninput="calcularFila(this)">
</td>

<td>
<input type="number" class="iva" value="10" oninput="calcularFila(this)">
</td>

<td>
<input type="number" class="total" readonly>
</td>

</tr>
`;

}

}

/* CALCULAR FILA */

window.calcularFila=function(input){

const fila=input.parentElement.parentElement;

const pido=fila.querySelector(".pido").value||0;
const precio=fila.querySelector(".precio").value||0;
const iva=fila.querySelector(".iva").value||0;

const total=(pido*precio)*(1+(iva/100));

fila.querySelector(".total").value=total.toFixed(2);

calcularTotales();

}

/* CALCULAR TOTALES */

window.calcularTotales=function(){

let subtotal=0;
let ivaTotal=0;

document.querySelectorAll("#tablaPedido tr").forEach(fila=>{

const pido=fila.querySelector(".pido").value||0;
const precio=fila.querySelector(".precio").value||0;
const iva=fila.querySelector(".iva").value||0;

const base=pido*precio;
const ivaCalc=base*(iva/100);

subtotal+=base;
ivaTotal+=ivaCalc;

});

document.getElementById("subtotal").value=subtotal.toFixed(2);
document.getElementById("ivatotal").value=ivaTotal.toFixed(2);
document.getElementById("totalfinal").value=(subtotal+ivaTotal).toFixed(2);

}

/* NAVEGACION */

window.ir=function(panel){

document.getElementById("principal").style.display="none";
document.getElementById("pedidos").style.display="none";

document.getElementById(panel).style.display="block";

if(panel=="pedidos"){

actualizarFechaHora();
cargarListaProveedores();
crearTabla();

}

}

</script>

<style>

body{
background:black;
color:white;
font-family:Arial;
padding:20px;
}

button{
width:100%;
padding:15px;
margin:5px 0;
background:#1a1a1a;
color:white;
border:1px solid #444;
}

input,select{
background:#111;
color:white;
border:1px solid #333;
padding:5px;
}

table{
width:100%;
border-collapse:collapse;
}

td{
border:1px solid #333;
}

</style>

</head>

<body>

<div id="principal">

<h1>MONOLITO GPT PRO</h1>

<button onclick="ir('pedidos')">PEDIDOS</button>

</div>

<div id="pedidos" style="display:none">

<button onclick="ir('principal')">← VOLVER</button>

<h2>HOJA DE PEDIDO</h2>

Fecha
<input id="fecha" readonly>

Hora
<input id="hora" readonly>

Código camarero
<input id="codigoCamarero" oninput="buscarCamarero()">

Nombre camarero
<input id="nombreCamarero" readonly>

Proveedor
<select id="proveedorPedido"></select>

<br><br>

<table>

<tr>
<td>Pido</td>
<td>Artículo</td>
<td>Precio</td>
<td>IVA %</td>
<td>Total</td>
</tr>

<tbody id="tablaPedido"></tbody>

</table>

<br>

Subtotal
<input id="subtotal" readonly>

IVA
<input id="ivatotal" readonly>

TOTAL
<input id="totalfinal" readonly>

</div>

</body>
</html>
