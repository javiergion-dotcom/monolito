<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LIBRO - MONOLITO</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",
  authDomain: "monolito-ed87d.firebaseapp.com",
  projectId: "monolito-ed87d",
  storageBucket: "monolito-ed87d.firebasestorage.app",
  messagingSenderId: "737849584362",
  appId: "1:737849584362:web:3d1821bedcd64080cf8593"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.guardarArticulo = async function() {

  const nombre = document.getElementById("nombre").value;

  if(!nombre) return;

  await addDoc(collection(db, "articulos"), {
    nombre: nombre,
    fecha: new Date()
  });

  document.getElementById("nombre").value = "";

};


// Mostrar artículos en tiempo real

onSnapshot(collection(db, "articulos"), (snapshot) => {

  const lista = document.getElementById("lista");

  lista.innerHTML = "";

  snapshot.forEach(doc => {

    const div = document.createElement("div");

    div.textContent = doc.data().nombre;

    div.style.padding = "8px";
    div.style.background = "#ecf0f1";
    div.style.marginTop = "5px";

    lista.appendChild(div);

  });

});

</script>

<style>

body {
  font-family: Segoe UI;
  padding: 20px;
  background: #f4f6f8;
}

input {
  font-size: 18px;
  padding: 10px;
  width: 100%;
}

button {
  font-size: 18px;
  padding: 10px;
  margin-top: 10px;
}

</style>

</head>

<body>

<h2>LIBRO</h2>

<input id="nombre" placeholder="Nombre artículo">

<button onclick="guardarArticulo()">
Guardar
</button>

<br><br>

<button onclick="window.location.href='index.html'">
Volver
</button>

<h3>Artículos:</h3>

<div id="lista"></div>

</body>
</html>
