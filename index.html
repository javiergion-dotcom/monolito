<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT-Pro</title>

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#e9e1d3;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#panel{
    width:340px;
    background:#f3eadb;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.25);
    overflow:hidden;
}

#titulo{
    background:#a3472a;
    color:white;
    text-align:center;
    font-size:30px;
    font-weight:bold;
    padding:16px;
}

#info{
    background:#e6dccb;
    text-align:center;
    padding:10px;
}

.modulo{
    position:relative;
    padding:18px 20px;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.pincel{
    position:absolute;
    left:10px;
    right:10px;
    top:6px;
    bottom:6px;
    border-radius:12px;
    opacity:0.6;
    z-index:0;
}

.texto{
    position:relative;
    z-index:1;
}

.libro .pincel{
    background:#9fb6bb;
}

.proveedores .pincel{
    background:#c9b2a1;
}

.ventas .pincel{
    background:#d2c29f;
}

.documentos .pincel{
    background:#bcbcbc;
}

#estado{
    background:#e6dccb;
    text-align:center;
    padding:10px;
}

</style>

</head>

<body>

<div id="panel">

<div id="titulo">MONOLITO</div>

<div id="info">
Operador: Javier • Hora: <span id="hora"></span>
</div>

<div class="modulo libro" onclick="abrir('LIBRO')">
<div class="pincel"></div>
<div class="texto">📘 LIBRO</div>
</div>

<div class="modulo proveedores" onclick="abrir('PROVEEDORES')">
<div class="pincel"></div>
<div class="texto">📦 PROVEEDORES</div>
</div>

<div class="modulo ventas" onclick="abrir('VENTAS')">
<div class="pincel"></div>
<div class="texto">💰 VENTAS</div>
</div>

<div class="modulo documentos" onclick="abrir('DOCUMENTOS')">
<div class="pincel"></div>
<div class="texto">📁 DOCUMENTOS</div>
</div>

<div id="estado">
● Sistema activo ● Sincronizado ● Autoguardado activo
</div>

</div>

<script>

function abrir(nombre){
    alert("Módulo "+nombre+" activado");
}

function actualizarHora(){
    document.getElementById("hora").textContent =
        new Date().toLocaleTimeString();
}

setInterval(actualizarHora,1000);
actualizarHora();

</script>

</body>
</html>
