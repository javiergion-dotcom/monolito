<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
margin:0;
background:#0a0a0a;
font-family:Arial;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:28px;
}

.panel{
max-width:400px;
margin:auto;
}

.btn{
display:block;
width:100%;
padding:15px;
margin:10px 0;
background:#111;
border:1px solid #333;
color:white;
font-size:18px;
cursor:pointer;
}

.btn:hover{
background:#00ffcc;
color:black;
}

.pantalla{
display:none;
padding:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
background:#111;
border:1px solid #333;
color:white;
}

.guardar{
background:#00ffcc;
border:none;
padding:12px;
cursor:pointer;
width:100%;
}

</style>

</head>

<body>

<div id="inicio">

<div class="header">
MONOLITO GPT PRO
</div>

<div class="panel">

<button class="btn" onclick="abrirArticulos()">
Artículos
</button>

<button class="btn">
Proveedores
</button>

<button class="btn">
Pedidos
</button>

<button class="btn">
Ventas
</button>

<button class="btn">
Diario
</button>

</div>

</div>


<div id="articulos" class="pantalla">

<h2>Artículos</h2>

<input id="nombre" placeholder="Nombre del artículo">

<button class="guardar" onclick="guardarArticulo()">
Guardar artículo
</button>

<button class="guardar" onclick="volver()">
Volver
</button>

</div>


<script>

function abrirArticulos(){

document.getElementById("inicio").style.display="none";
document.getElementById("articulos").style.display="block";

}

function volver(){

document.getElementById("articulos").style.display="none";
document.getElementById("inicio").style.display="block";

}

function guardarArticulo(){

let nombre = document.getElementById("nombre").value;

if(nombre==""){
alert("Escribe un nombre");
return;
}

alert("Artículo guardado: " + nombre);

document.getElementById("nombre").value="";

}

</script>

</body>
</html>
