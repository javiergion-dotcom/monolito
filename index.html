<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
    margin:0;
    background: linear-gradient(180deg,#1a1a1a,#2b2b2b);
    font-family: Arial, Helvetica, sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.panel{
    width:340px;
    background:#111;
    border-radius:12px;
    box-shadow:0 0 25px rgba(0,0,0,0.6);
    overflow:hidden;
}

.header{
    background:linear-gradient(180deg,#2a2a2a,#111);
    padding:18px;
    text-align:center;
    font-size:26px;
    font-weight:bold;
    letter-spacing:2px;
}

.subheader{
    text-align:center;
    padding:8px;
    font-size:14px;
    color:#aaa;
    border-bottom:1px solid #333;
}

.boton{
    display:flex;
    align-items:center;
    gap:12px;
    padding:16px;
    border-bottom:1px solid #222;
    background:linear-gradient(180deg,#2b2b2b,#1c1c1c);
    cursor:pointer;
    transition:0.2s;
    font-size:18px;
}

.boton:hover{
    background:linear-gradient(180deg,#3a3a3a,#222);
}

.icono{
    font-size:22px;
}

.footer{
    padding:10px;
    text-align:center;
    font-size:12px;
    color:#777;
}

.nuevo{
    background:linear-gradient(180deg,#b00000,#600000);
    justify-content:center;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="panel">

<div class="header">
MONOLITO GPT PRO
</div>

<div class="subheader">
Sistema GION • Operador: Javier • <span id="hora"></span>
</div>

<div class="boton" onclick="abrir('pedidos.html')">
<span class="icono">🧾</span> PEDIDOS
</div>

<div class="boton" onclick="abrir('proveedores.html')">
<span class="icono">📦</span> PROVEEDORES
</div>

<div class="boton" onclick="abrir('articulos.html')">
<span class="icono">🍺</span> ARTÍCULOS
</div>

<div class="boton" onclick="abrir('ventas.html')">
<span class="icono">📊</span> VENTAS
</div>

<div class="boton" onclick="abrir('diario.html')">
<span class="icono">📓</span> DIARIO DEL BAR
</div>

<div class="boton nuevo" onclick="abrir('nuevo_pedido.html')">
NUEVO PEDIDO
</div>

<div class="footer">
Sistema activo • Sincronizado • Autoguardado activo
</div>

</div>

<script>

function abrir(pagina){
    window.location.href = pagina;
}

function actualizarHora(){
    const ahora = new Date();
    const hora =
        String(ahora.getHours()).padStart(2,'0') + ":" +
        String(ahora.getMinutes()).padStart(2,'0');

    document.getElementById("hora").innerText = hora;
}

actualizarHora();
setInterval(actualizarHora,1000);

</script>

</body>
</html>
