<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",
authDomain: "monolito-ed87d.firebaseapp.com",
projectId: "monolito-ed87d",
storageBucket: "monolito-ed87d.firebasestorage.app",
messagingSenderId: "737849584362",
appId: "1:737849584362:web:bdb3b3b9fd65425dcf8593"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ARTICULOS */

window.guardarArticulo = async function(){

const nombre = document.getElementById("nombreArticulo").value;
const precio = document.getElementById("precioArticulo").value;
const iva = document.getElementById("ivaArticulo").value;
const proveedor = document.getElementById("proveedorArticulo").value;

if(nombre=="") return;

await addDoc(collection(db,"articulos"),{

nombre,
precio,
iva,
proveedor,
fecha:new Date().toISOString()

});

cargarArticulos();

}

window.cargarArticulos = async function(){

const lista = document.getElementById("listaArticulos");

lista.innerHTML="";

const datos = await getDocs(collection(db,"articulos"));

datos.forEach(doc=>{

const d = doc.data();

lista.innerHTML += `
<div class="item">
${d.nombre} | ${d.precio}€ | IVA ${d.iva}% | ${d.proveedor}
</div>
`;

});

}

/* VACACIONES */

window.guardarVacaciones = async function(){

const camarero = document.getElementById("nombreCamarero").value;

if(camarero=="") return;

const filas = [];

for(let i=1;i<=4;i++){

const desde = document.getElementById("desde"+i).value;
const hasta = document.getElementById("hasta"+i).value;
const dias = document.getElementById("dias"+i).value;

if(desde || hasta || dias){

filas.push({desde,hasta,dias});

}

}

await addDoc(collection(db,"vacaciones"),{

camarero,
filas,
fecha:new Date().toISOString()

});

cargarVacaciones();

}

window.cargarVacaciones = async function(){

const lista = document.getElementById("listaVacaciones");

lista.innerHTML="";

const datos = await getDocs(collection(db,"vacaciones"));

datos.forEach(doc=>{

const d = doc.data();

lista.innerHTML += `<div class="item">Vacaciones: ${d.camarero}</div>`;

});

}

/* NAVEGACION */

window.ir=function(panel){

["principal","articulos","proveedores","ventas","vacaciones"].forEach(id=>{
document.getElementById(id).style.display="none";
});

document.getElementById(panel).style.display="block";

if(panel=="articulos") cargarArticulos();
if(panel=="vacaciones") cargarVacaciones();

}

</script>

<style>

body{
background:black;
color:white;
font-family:Arial;
padding:20px;
}

button{
width:100%;
padding:15px;
margin:5px;
background:#111;
color:white;
border:1px solid #333;
}

input{
width:100%;
padding:10px;
margin:3px;
background:#111;
color:white;
border:1px solid #333;
}

.item{
background:#222;
padding:10px;
margin:5px;
}

.fila{
display:grid;
grid-template-columns:1fr 1fr 80px;
gap:5px;
}

</style>

</head>

<body>

<div id="principal">

<h1>MONOLITO GPT PRO</h1>

<button onclick="ir('articulos')">ARTÍCULOS</button>
<button onclick="ir('ventas')">VENTAS</button>
<button onclick="ir('vacaciones')">VACACIONES</button>

</div>

<div id="articulos" style="display:none">

<button onclick="ir('principal')">VOLVER</button>

<input id="nombreArticulo" placeholder="Nombre artículo">
<input id="precioArticulo" placeholder="Precio compra">
<input id="ivaArticulo" placeholder="IVA %">
<input id="proveedorArticulo" placeholder="Proveedor">

<button onclick="guardarArticulo()">Guardar</button>

<div id="listaArticulos"></div>

</div>

<div id="ventas" style="display:none">

<button onclick="ir('principal')">VOLVER</button>

Ventas preparadas

</div>

<div id="vacaciones" style="display:none">

<button onclick="ir('principal')">VOLVER</button>

<input id="nombreCamarero" placeholder="Nombre camarero">

<div class="fila">
<input id="desde1" type="date">
<input id="hasta1" type="date">
<input id="dias1" placeholder="días">
</div>

<div class="fila">
<input id="desde2" type="date">
<input id="hasta2" type="date">
<input id="dias2">
</div>

<div class="fila">
<input id="desde3" type="date">
<input id="hasta3" type="date">
<input id="dias3">
</div>

<div class="fila">
<input id="desde4" type="date">
<input id="hasta4" type="date">
<input id="dias4">
</div>

<button onclick="guardarVacaciones()">Guardar vacaciones</button>

<div id="listaVacaciones"></div>

</div>

</body>
</html>
