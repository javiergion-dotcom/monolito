
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",
  authDomain: "monolito-ed87d.firebaseapp.com",
  projectId: "monolito-ed87d",
  storageBucket: "monolito-ed87d.firebasestorage.app",
  messagingSenderId: "737849584362",
  appId: "1:737849584362:web:bdb3b3b9fd65425dcf8593",
  measurementId: "G-V8KHB086M3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.guardarArticulo = async function(){

  const nombre = document.getElementById("nombre").value;
  const precio = document.getElementById("precio").value;

  if(!nombre || !precio){
    alert("Completa los datos");
    return;
  }

  await addDoc(collection(db, "articulos"), {
    nombre: nombre,
    precio: precio
  });

  document.getElementById("nombre").value="";
  document.getElementById("precio").value="";

  cargarArticulos();

}

window.cargarArticulos = async function(){

  const lista = document.getElementById("lista");
  lista.innerHTML="";

  const querySnapshot = await getDocs(collection(db, "articulos"));

  querySnapshot.forEach((doc) => {

    const data = doc.data();

    lista.innerHTML += `
      <div class="item">
        ${data.nombre} - ${data.precio} €
      </div>
    `;

  });

}

window.mostrarArticulos = function(){
  document.getElementById("principal").style.display="none";
  document.getElementById("articulosPanel").style.display="block";
  cargarArticulos();
}

window.volver = function(){
  document.getElementById("principal").style.display="block";
  document.getElementById("articulosPanel").style.display="none";
}

</script>

<style>

body{
background:#000;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

button{
width:100%;
padding:15px;
margin:5px 0;
background:#1a1a1a;
color:white;
border:none;
font-size:18px;
}

input{
width:100%;
padding:12px;
margin:5px 0;
background:#111;
color:white;
border:none;
}

.item{
background:#111;
padding:12px;
margin-top:5px;
}

</style>

</head>

<body>

<div id="principal">

<h1>MONOLITO GPT PRO</h1>

<button onclick="mostrarArticulos()">
Artículos
</button>

</div>

<div id="articulosPanel" style="display:none">

<button onclick="volver()">
← Volver
</button>

<h2>Nuevo artículo</h2>

<input id="nombre" placeholder="Nombre">
<input id="precio" placeholder="Precio">

<button onclick="guardarArticulo()">
Guardar artículo
</button>

<div id="lista"></div>

</div>

</body>
</html>
