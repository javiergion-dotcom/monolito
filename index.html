<script type="module">

// ... Firebase igual que antes ...

window.rellenarArticulo=function(input){

const nombre=input.value;

const fila=input.parentNode.parentNode;

const precioInput=fila.querySelector(".precio");
const ivaInput=fila.querySelector(".iva");
const cantidadInput=fila.querySelector(".cantidad");

const articulo=
articulosProveedor.find(a=>a.nombre==nombre);

if(articulo){

precioInput.value=articulo.precio;
ivaInput.value=articulo.iva;

// SALTO AUTOMATICO A CANTIDAD
cantidadInput.focus();
cantidadInput.select();

}

calcular();

};

// SALTO AUTOMATICO A SIGUIENTE FILA
window.addEventListener("keydown",function(e){

if(e.key==="Enter"){

const active=document.activeElement;

if(active.classList.contains("cantidad")){

e.preventDefault();

const fila=active.closest("tr");
const siguiente=fila.nextElementSibling;

if(siguiente){

siguiente.querySelector(".articulo").focus();

}

}

}

});
</script>
