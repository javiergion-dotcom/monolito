<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",
authDomain: "monolito-ed87d.firebaseapp.com",
projectId: "monolito-ed87d",
storageBucket: "monolito-ed87d.firebasestorage.app",
messagingSenderId: "737849584362",
appId: "1:737849584362:web:bdb3b3b9fd65425dcf8593"

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* CAMAREROS */

const camareros = {
"475":"JAVI",
"312":"MARCOS",
"128":"ANA",
"901":"LUIS"
};

window.buscarCamarero = function(){

const codigo = document.getElementById("codigoCamarero").value.trim();

document.getElementById("nombreCamarero").value =
camareros[codigo] || "";

}


/* FECHA HORA */

window.fechaActual = function(){

const ahora = new Date();

document.getElementById("fecha").value =
ahora.toLocaleDateString();

document.getElementById("hora").value =
ahora.toLocaleTimeString();

}


/* CARGAR PROVEEDORES */

window.cargarProveedores = async function(){

const select =
document.getElementById("proveedor");

select.innerHTML="";

const snap =
await getDocs(collection(db,"proveedores"));

snap.forEach(doc=>{

const data = doc.data();

const option =
document.createElement("option");

option.value=data.nombre;
option.textContent=data.nombre;

select.appendChild(option);

});

}


/* ESTADO PEDIDO */

let estadoPagado=false;
let estadoIncidencia=false;


window.togglePagado=function(){

estadoPagado=!estadoPagado;

const btn =
document.getElementById("btnPagado");

if(estadoPagado){

btn.classList.add("verde");

guardarHistorico();

}else{

btn.classList.remove("verde");

}

}


window.toggleIncidencia=function(){

estadoIncidencia=!estadoIncidencia;

const btn =
document.getElementById("btnIncidencia");

const panel =
document.getElementById("panelIncidencia");

if(estadoIncidencia){

btn.classList.add("rojo");

panel.style.display="block";

}else{

btn.classList.remove("rojo");

panel.style.display="none";

}

}


/* GUARDAR HISTORICO */

window.guardarHistorico = async function(){

const pedido={

fecha:
document.getElementById("fecha").value,

hora:
document.getElementById("hora").value,

camarero:
document.getElementById("nombreCamarero").value,

proveedor:
document.getElementById("proveedor").value,

pagado:estadoPagado,

incidencia:estadoIncidencia,

textoIncidencia:
document.getElementById("textoIncidencia").value,

acuerdo:
document.getElementById("acuerdo").value,

firma:
document.getElementById("firma").value,

timestamp:new Date().toISOString()

};

await addDoc(collection(db,"historico"),pedido);

alert("Pedido guardado en histórico");

}


/* NAVEGACION */

window.ir=function(panel){

document.getElementById("principal").style.display="none";
document.getElementById("pedido").style.display="none";

document.getElementById(panel).style.display="block";

if(panel=="pedido"){

fechaActual();
cargarProveedores();

}

}

</script>


<style>

body{

background:black;
color:white;
font-family:Arial;
padding:20px;

}


button{

width:100%;
padding:15px;
margin:5px 0;
background:#222;
color:white;
border:1px solid #555;
font-size:18px;

}


.estado{

width:48%;
display:inline-block;
padding:20px;
text-align:center;
border:2px solid white;
margin:5px;
font-weight:bold;

}


.verde{

background:green;

}


.rojo{

background:red;

}


textarea{

width:100%;
height:80px;
background:#111;
color:white;
border:1px solid #333;

}


input,select{

width:100%;
padding:10px;
background:#111;
color:white;
border:1px solid #333;

}

</style>

</head>

<body>


<div id="principal">

<h1>MONOLITO GPT PRO</h1>

<button onclick="ir('pedido')">
NUEVO PEDIDO
</button>

</div>


<div id="pedido" style="display:none">

<button onclick="ir('principal')">
← VOLVER
</button>


Fecha
<input id="fecha" readonly>

Hora
<input id="hora" readonly>


Código camarero
<input id="codigoCamarero"
oninput="buscarCamarero()">


Nombre camarero
<input id="nombreCamarero" readonly>


Proveedor
<select id="proveedor"></select>


<br><br>


<div>

<div id="btnPagado"
class="estado"
onclick="togglePagado()">

PAGADO

</div>


<div id="btnIncidencia"
class="estado"
onclick="toggleIncidencia()">

INCIDENCIA

</div>

</div>


<div id="panelIncidencia"
style="display:none;">


Incidencia

<textarea id="textoIncidencia"></textarea>


Acuerdo

<textarea id="acuerdo"></textarea>


Firma proveedor

<input id="firma">


</div>


</div>


</body>
</html>
