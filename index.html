<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MONOLITO GPT PRO</title>

<style>

body{
    background:#0b0b0b;
    color:white;
    font-family:Arial;
    margin:0;
    padding:20px;
}

h1{
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    margin:5px 0;
    background:#1f1f1f;
    color:white;
    border:none;
    font-size:18px;
}

button:hover{
    background:#00c2a8;
}

.panel{
    display:none;
    margin-top:20px;
}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    font-size:16px;
}

.lista{
    margin-top:20px;
    background:#111;
    padding:10px;
}

</style>

</head>
<body>

<h1>MONOLITO GPT PRO</h1>

<button onclick="abrirArticulos()">Artículos</button>

<div id="panelArticulos" class="panel">

<h2>Nuevo artículo</h2>

<input id="nombre" placeholder="Nombre del artículo">
<input id="precio" placeholder="Precio">

<button onclick="guardarArticulo()">Guardar artículo</button>

<div class="lista" id="lista"></div>

</div>

<script>

let articulos = JSON.parse(localStorage.getItem("articulos")) || [];

function abrirArticulos(){

document.getElementById("panelArticulos").style.display="block";

mostrar();

}

function guardarArticulo(){

let nombre = document.getElementById("nombre").value;
let precio = document.getElementById("precio").value;

if(nombre=="" || precio==""){
alert("Completa los datos");
return;
}

articulos.push({
nombre:nombre,
precio:precio
});

localStorage.setItem("articulos", JSON.stringify(articulos));

document.getElementById("nombre").value="";
document.getElementById("precio").value="";

mostrar();

}

function mostrar(){

let html="";

for(let a of articulos){

html+=`
<div>
${a.nombre} - ${a.precio} €
</div>
`;

}

document.getElementById("lista").innerHTML=html;

}

</script>

</body>
</html>
