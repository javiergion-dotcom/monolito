<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {

apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",

authDomain: "monolito-ed87d.firebaseapp.com",

projectId: "monolito-ed87d",

storageBucket: "monolito-ed87d.firebasestorage.app",

messagingSenderId: "737849584362",

appId: "1:737849584362:web:bdb3b3b9fd65425dcf8593"

};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);


/* ADMINISTRADORES */

const admins = ["5475","4544"];


/* DETECTAR CAMARERO */

window.detectarCamarero = async function(){

const codigo = document.getElementById("codigoCamarero").value.trim();

if(codigo=="") return;

const nombreInput = document.getElementById("nombreCamarero");


const q = query(collection(db,"camareros"), where("codigo","==",codigo));

const snap = await getDocs(q);


if(!snap.empty){

const data = snap.docs[0].data();

nombreInput.value = data.nombre;

nombreInput.disabled = true;

}else{

nombreInput.value = "";

nombreInput.disabled = !admins.includes(codigo);

}

}


/* GUARDAR CAMARERO */

window.guardarCamarero = async function(){

const codigo = document.getElementById("codigoCamarero").value.trim();

const nombre = document.getElementById("nombreCamarero").value.trim();

if(codigo=="" || nombre=="") return;

await addDoc(collection(db,"camareros"),{

codigo:codigo,

nombre:nombre

});

document.getElementById("nombreCamarero").disabled = true;

}


/* CARGAR PROVEEDORES */

window.cargarProveedoresSelect = async function(){

const select = document.getElementById("proveedorPedido");

select.innerHTML = "";

const snap = await getDocs(collection(db,"proveedores"));

snap.forEach(doc=>{

const data = doc.data();

const option = document.createElement("option");

option.value = data.nombre;

option.textContent = data.nombre;

select.appendChild(option);

});

}


/* NAVEGACION */

window.ir = function(panel){

document.getElementById("principal").style.display="none";

document.getElementById("pedidos").style.display="none";

document.getElementById(panel).style.display="block";

if(panel=="pedidos") cargarProveedoresSelect();

}


/* FECHA Y HORA */

function actualizarFechaHora(){

const ahora = new Date();

document.getElementById("fecha").textContent = ahora.toLocaleDateString();

document.getElementById("hora").textContent = ahora.toLocaleTimeString();

}

setInterval(actualizarFechaHora,1000);

</script>


<style>

body{

background:black;

color:white;

font-family:Arial;

padding:20px;

}

button{

width:100%;

padding:15px;

margin:6px 0;

background:linear-gradient(#2a2a2a,#111);

color:white;

border:1px solid #444;

border-radius:8px;

font-size:18px;

}

input, select{

width:100%;

padding:12px;

margin:5px 0;

background:#111;

color:white;

border:1px solid #333;

font-size:16px;

}

.panel{

background:#111;

padding:10px;

margin-top:10px;

border-radius:6px;

}

</style>

</head>

<body onload="actualizarFechaHora()">


<div id="principal">

<h1>MONOLITO GPT PRO</h1>

<button onclick="ir('pedidos')">PEDIDOS</button>

</div>



<div id="pedidos" style="display:none">

<button onclick="ir('principal')">← VOLVER</button>

<h2>PEDIDO</h2>


<div class="panel">

Fecha: <span id="fecha"></span><br>

Hora: <span id="hora"></span>

</div>


<input id="codigoCamarero" placeholder="Código camarero" oninput="detectarCamarero()">

<input id="nombreCamarero" placeholder="Nombre camarero">

<button onclick="guardarCamarero()">GUARDAR CAMARERO</button>


<select id="proveedorPedido"></select>


</div>


</body>
</html>
