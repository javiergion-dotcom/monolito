<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO</title>

<style>

body{
    margin:0;
    font-family:Segoe UI, Arial, sans-serif;
    background:#f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

#app{
    width:360px;
    background:white;
    border-radius:12px;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
    overflow:hidden;
}

#header{
    background:#2c3e50;
    color:white;
    padding:18px;
    text-align:center;
    font-size:24px;
    font-weight:bold;
}

#info{
    background:#ecf0f1;
    padding:10px;
    text-align:center;
    font-size:14px;
}

.menu{
    display:flex;
    flex-direction:column;
}

.boton{
    padding:18px;
    font-size:18px;
    border:none;
    border-bottom:1px solid #e0e0e0;
    background:white;
    cursor:pointer;
    text-align:left;
}

.boton:hover{
    background:#f0f3f5;
}

.boton:active{
    background:#e2e6ea;
}

#footer{
    background:#ecf0f1;
    padding:10px;
    text-align:center;
    font-size:13px;
    color:#555;
}

</style>

</head>

<body>

<div id="app">

<div id="header">
MONOLITO
</div>

<div id="info">
Operador: Javier • Hora: <span id="hora"></span>
</div>

<div class="menu">

<button class="boton" onclick="abrir('libro')">
📘 LIBRO
</button>

<button class="boton" onclick="abrir('proveedores')">
📦 PROVEEDORES
</button>

<button class="boton" onclick="abrir('ventas')">
💰 VENTAS
</button>

<button class="boton" onclick="abrir('documentos')">
📁 DOCUMENTOS
</button>

</div>

<div id="footer">
Sistema activo • Conectado • Operativo
</div>

</div>

}

</script>

</body>
</html>
