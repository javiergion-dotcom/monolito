<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MONOLITO GPT PRO</title>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",
authDomain: "monolito-ed87d.firebaseapp.com",
projectId: "monolito-ed87d",
storageBucket: "monolito-ed87d.firebasestorage.app",
messagingSenderId: "737849584362",
appId: "1:737849584362:web:bdb3b3b9fd65425dcf8593"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


/* ---------- NAVEGACION ---------- */

window.ir = function(panel){

document.getElementById("principal").style.display="none";
document.getElementById("articulos").style.display="none";
document.getElementById("proveedores").style.display="none";
document.getElementById("vacaciones").style.display="none";

document.getElementById(panel).style.display="block";

if(panel=="articulos") cargarArticulos();
if(panel=="proveedores") cargarProveedores();
if(panel=="vacaciones") cargarVacaciones();

}


/* ---------- ARTICULOS ---------- */

window.guardarArticulo = async function(){

const nombre =
document.getElementById("nombreArticulo").value.trim();

const precio =
document.getElementById("precioArticulo").value.trim();

if(nombre=="" || precio=="") return;

await addDoc(collection(db,"articulos"),{
nombre,
precio,
fecha:new Date().toISOString()
});

document.getElementById("nombreArticulo").value="";
document.getElementById("precioArticulo").value="";

cargarArticulos();

}

window.cargarArticulos = async function(){

const lista =
document.getElementById("listaArticulos");

lista.innerHTML="";

const datos =
await getDocs(collection(db,"articulos"));

datos.forEach(doc=>{

const d = doc.data();

if(!d.nombre) return;

lista.innerHTML +=
`<div class="item">${d.nombre} - ${d.precio} €</div>`;

});

}


/* ---------- PROVEEDORES ---------- */

window.guardarProveedor = async function(){

const nombre =
document.getElementById("nombreProveedor").value.trim();

const telefono =
document.getElementById("telefonoProveedor").value.trim();

if(nombre=="") return;

await addDoc(collection(db,"proveedores"),{
nombre,
telefono,
fecha:new Date().toISOString()
});

document.getElementById("nombreProveedor").value="";
document.getElementById("telefonoProveedor").value="";

cargarProveedores();

}

window.cargarProveedores = async function(){

const lista =
document.getElementById("listaProveedores");

lista.innerHTML="";

const datos =
await getDocs(collection(db,"proveedores"));

datos.forEach(doc=>{

const d = doc.data();

if(!d.nombre) return;

lista.innerHTML +=
`<div class="item">${d.nombre} - ${d.telefono || ""}</div>`;

});

}


/* ---------- VACACIONES ---------- */

window.guardarVacaciones = async function(){

const camarero =
document.getElementById("nombreCamarero").value.trim();

if(camarero=="") return;

const filas = [];

for(let i=1;i<=4;i++){

const desde =
document.getElementById("desde"+i).value;

const hasta =
document.getElementById("hasta"+i).value;

const dias =
document.getElementById("dias"+i).value;

if(desde || hasta || dias){

filas.push({
desde,
hasta,
dias
});

}

}

await addDoc(collection(db,"vacaciones"),{
camarero,
filas,
fecha:new Date().toISOString()
});

cargarVacaciones();

}


window.cargarVacaciones = async function(){

const lista =
document.getElementById("listaVacaciones");

lista.innerHTML="";

const datos =
await getDocs(collection(db,"vacaciones"));

datos.forEach(doc=>{

const d = doc.data();

lista.innerHTML +=
`<div class="item">${d.camarero}</div>`;

});

}

</script>


<style>

body{

background:#000;
color:white;
font-family:Arial;
margin:0;
padding:20px;

}

h1{

text-align:center;
margin-bottom:30px;

}

.boton{

background:linear-gradient(#333,#111);
padding:18px;
margin:10px 0;
text-align:center;
border-radius:8px;
border:1px solid #555;

}

.boton:active{

background:linear-gradient(#111,#333);

}

input{

width:100%;
padding:12px;
margin:5px 0;
background:#111;
color:white;
border:1px solid #333;

}

.item{

background:#111;
padding:12px;
margin-top:5px;
border-left:3px solid #00ffaa;

}

.volver{

margin-bottom:15px;
color:#00ffaa;

}

.fila{

display:grid;
grid-template-columns:1fr 1fr 80px;
gap:5px;

}

</style>

</head>


<body>


<!-- PRINCIPAL -->

<div id="principal">

<h1>MONOLITO GPT PRO</h1>

<div class="boton" onclick="ir('articulos')">
ARTÍCULOS
</div>

<div class="boton" onclick="ir('proveedores')">
PROVEEDORES
</div>

<div class="boton" onclick="ir('vacaciones')">
VACACIONES
</div>

</div>



<!-- ARTICULOS -->

<div id="articulos" style="display:none">

<div class="volver" onclick="ir('principal')">
← Volver
</div>

<h2>Artículos</h2>

<input id="nombreArticulo" placeholder="Nombre">

<input id="precioArticulo" placeholder="Precio">

<div class="boton"
onclick="guardarArticulo()">

Guardar

</div>

<div id="listaArticulos"></div>

</div>



<!-- PROVEEDORES -->

<div id="proveedores" style="display:none">

<div class="volver" onclick="ir('principal')">
← Volver
</div>

<h2>Proveedores</h2>

<input id="nombreProveedor" placeholder="Nombre">

<input id="telefonoProveedor" placeholder="Teléfono">

<div class="boton"
onclick="guardarProveedor()">

Guardar

</div>

<div id="listaProveedores"></div>

</div>



<!-- VACACIONES -->

<div id="vacaciones" style="display:none">

<div class="volver" onclick="ir('principal')">
← Volver
</div>

<h2>Vacaciones</h2>

<input id="nombreCamarero" placeholder="Nombre camarero">

<div class="fila">

<input type="date" id="desde1">
<input type="date" id="hasta1">
<input type="number" id="dias1">

</div>

<div class="fila">

<input type="date" id="desde2">
<input type="date" id="hasta2">
<input type="number" id="dias2">

</div>

<div class="fila">

<input type="date" id="desde3">
<input type="date" id="hasta3">
<input type="number" id="dias3">

</div>

<div class="fila">

<input type="date" id="desde4">
<input type="date" id="hasta4">
<input type="number" id="dias4">

</div>

<div class="boton"
onclick="guardarVacaciones()">

Guardar vacaciones

</div>

<div id="listaVacaciones"></div>

</div>


</body>
</html>
