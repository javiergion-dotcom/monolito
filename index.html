<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",
authDomain: "monolito-ed87d.firebaseapp.com",
projectId: "monolito-ed87d",
storageBucket: "monolito-ed87d.firebasestorage.app",
messagingSenderId: "737849584362",
appId: "1:737849584362:web:bdb3b3b9fd65425dcf8593"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ADMINISTRADORES */

const administradores = ["5475","4544"];

/* CARGAR PROVEEDORES */

window.cargarProveedoresSelect = async function(){

const select = document.getElementById("proveedorPedido");

select.innerHTML="";

const querySnapshot = await getDocs(collection(db,"proveedores"));

querySnapshot.forEach(doc=>{

const data = doc.data();

select.innerHTML += `<option value="${data.nombre}">${data.nombre}</option>`;

});

}

/* SISTEMA CAMAREROS */

window.verificarCamarero = async function(){

const codigo = document.getElementById("codigoCamarero").value.trim();

if(codigo=="") return;

const nombreInput = document.getElementById("nombreCamarero");

const q = query(collection(db,"camareros"), where("codigo","==",codigo));

const querySnapshot = await getDocs(q);

if(!querySnapshot.empty){

querySnapshot.forEach(doc=>{

nombreInput.value = doc.data().nombre;

});

nombreInput.disabled = true;

}else{

if(administradores.includes(codigo)){

nombreInput.disabled = false;

}else{

nombreInput.disabled = false;

}

}

}

/* GUARDAR CAMARERO */

window.guardarCamarero = async function(){

const codigo = document.getElementById("codigoCamarero").value.trim();

const nombre = document.getElementById("nombreCamarero").value.trim();

if(codigo=="" || nombre=="") return;

await addDoc(collection(db,"camareros"),{

codigo:codigo,
nombre:nombre

});

document.getElementById("nombreCamarero").disabled = true;

alert("Camarero guardado");

}

/* NAVEGACION */

window.ir = function(panel){

document.getElementById("principal").style.display="none";
document.getElementById("pedidos").style.display="none";

document.getElementById(panel).style.display="block";

if(panel=="pedidos") cargarProveedoresSelect();

}

/* FECHA Y HORA */

window.onload = function(){

const now = new Date();

document.getElementById("fecha").innerText = now.toLocaleDateString();

document.getElementById("hora").innerText = now.toLocaleTimeString();

}

</script>

<style>

body{
background:black;
color:white;
font-family:Arial;
padding:20px;
}

button{
width:100%;
padding:15px;
margin:5px 0;
background:linear-gradient(#333,#111);

border:1px solid #555;
border-radius:8px;

}

input, select{
width:100%;
padding:12px;

background:#111;
color:white;

border-radius:6px;
font-size:16px;
}

.panel{

padding:15px;
margin-top:10px;

}

</style>

</head>

<body>

<div id="principal">

<h1>MONOLITO GPT PRO</h1>

<button onclick="ir('pedidos')">PEDIDOS</button>

</div>

<div id="pedidos" style="display:none">

<button onclick="ir('principal')">← VOLVER</button>

<div class="panel">

Fecha: <span id="fecha"></span><br>
Hora: <span id="hora"></span>

</div>

<div class="panel">

Código camarero:

<input id="codigoCamarero" onblur="verificarCamarero()">

Nombre camarero:

<input id="nombreCamarero">

<button onclick="guardarCamarero()">Guardar camarero</button>

</div>

<div class="panel">

Proveedor:

<select id="proveedorPedido"></select>

</div>

<div class="panel">

Sistema PEDIDOS listo.

</div>

</div>

</body>
