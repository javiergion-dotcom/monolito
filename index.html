
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
getDocs,
query,
where
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",
authDomain: "monolito-ed87d.firebaseapp.com",
projectId: "monolito-ed87d",
storageBucket: "monolito-ed87d.firebasestorage.app",
messagingSenderId: "737849584362",
appId: "1:737849584362:web:bdb3b3b9fd65425dcf8593"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const administradores = ["5475","4544"];

/* FECHA Y HORA */

window.onload = function(){

const now = new Date();

document.getElementById("fecha").innerText = now.toLocaleDateString();

document.getElementById("hora").innerText = now.toLocaleTimeString();

cargarProveedoresSelect();

crearFilas();

}

/* PROVEEDORES */

window.cargarProveedoresSelect = async function(){

const select = document.getElementById("proveedorPedido");

select.innerHTML="";

const querySnapshot = await getDocs(collection(db,"proveedores"));

querySnapshot.forEach(doc=>{

const data = doc.data();

select.innerHTML += `<option>${data.nombre}</option>`;

});

}

/* CAMARERO */

window.verificarCamarero = async function(){

const codigo = document.getElementById("codigoCamarero").value.trim();

if(codigo=="") return;

const nombreInput = document.getElementById("nombreCamarero");

const q = query(collection(db,"camareros"), where("codigo","==",codigo));

const querySnapshot = await getDocs(q);

if(!querySnapshot.empty){

querySnapshot.forEach(doc=>{

nombreInput.value = doc.data().nombre;

});

nombreInput.disabled = true;

}else{

nombreInput.disabled = false;

}

}

window.guardarCamarero = async function(){

const codigo = document.getElementById("codigoCamarero").value.trim();

const nombre = document.getElementById("nombreCamarero").value.trim();

if(codigo=="" || nombre=="") return;

await addDoc(collection(db,"camareros"),{

codigo,
nombre

});

document.getElementById("nombreCamarero").disabled=true;

alert("Guardado");

}

/* TABLA PEDIDO */

window.crearFilas = function(){

const tabla = document.getElementById("tablaPedido");

tabla.innerHTML="";

for(let i=0;i<20;i++){

tabla.innerHTML+=`

<tr>

<td><input type="number" class="cantidad" oninput="calcular()"></td>

<td><input type="text"></td>

<td><input type="number" class="precio" oninput="calcular()"></td>

<td><input type="number" class="iva" value="21" oninput="calcular()"></td>

<td class="totalLinea">0.00</td>

</tr>

`;

}

}

/* CALCULAR */

window.calcular = function(){

let subtotal=0;
let ivaTotal=0;

const filas=document.querySelectorAll("#tablaPedido tr");

filas.forEach(fila=>{

const cantidad=fila.querySelector(".cantidad").value || 0;

const precio=fila.querySelector(".precio").value || 0;

const iva=fila.querySelector(".iva").value || 0;

const total=cantidad*precio;

const ivaLinea=total*(iva/100);

fila.querySelector(".totalLinea").innerText=total.toFixed(2);

subtotal+=total;

ivaTotal+=ivaLinea;

});

document.getElementById("subtotal").innerText=subtotal.toFixed(2);

document.getElementById("ivatotal").innerText=ivaTotal.toFixed(2);

document.getElementById("totalfinal").innerText=(subtotal+ivaTotal).toFixed(2);

}

/* NAVEGACION */

window.ir=function(panel){

document.getElementById("principal").style.display="none";

document.getElementById("pedidos").style.display="none";

document.getElementById(panel).style.display="block";

}

</script>

<style>

body{
background:black;
color:white;
font-family:Arial;
padding:20px;
}

button{
width:100%;
padding:12px;
margin:5px 0;
background:#222;
color:white;
border:1px solid #555;
}

input{
width:100%;
background:#111;
color:white;
border:1px solid #555;
padding:5px;
}

table{
width:100%;
margin-top:10px;
}

td{
padding:4px;
}

.panel{
background:#111;
padding:10px;
margin-top:10px;
}

</style>

</head>

<body>

<div id="principal">

<h1>MONOLITO GPT PRO</h1>

<button onclick="ir('pedidos')">PEDIDOS</button>

</div>

<div id="pedidos" style="display:none">

<button onclick="ir('principal')">← VOLVER</button>

<div class="panel">

Fecha: <span id="fecha"></span><br>
Hora: <span id="hora"></span>

</div>

<div class="panel">

Código camarero:

<input id="codigoCamarero" onblur="verificarCamarero()">

Nombre camarero:

<input id="nombreCamarero">

<button onclick="guardarCamarero()">Guardar camarero</button>

</div>

<div class="panel">

Proveedor:

<select id="proveedorPedido"></select>

</div>

<table>

<thead>

<tr>

<th>Pido</th>
<th>Artículo</th>
<th>Precio</th>
<th>IVA %</th>
<th>Total</th>

</tr>

</thead>

<tbody id="tablaPedido"></tbody>

</table>

<div class="panel">

Subtotal: <span id="subtotal">0.00</span><br>
IVA: <span id="ivatotal">0.00</span><br>
TOTAL: <span id="totalfinal">0.00</span>

</div>

</div>

</body>
</html>
