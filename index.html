<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MONOLITO GPT PRO</title>

<style>

body{
    margin:0;
    background:#000;
    color:white;
    font-family:Arial;
}

.panel{
    max-width:400px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
}

button{
    width:100%;
    padding:15px;
    margin:5px 0;
    background:#1a1a1a;
    color:white;
    border:none;
    font-size:18px;
}

button.activo{
    background:#14c9b3;
    color:black;
}

input{
    width:100%;
    padding:12px;
    margin:5px 0;
    font-size:16px;
}

.item{
    background:#111;
    padding:12px;
    margin-top:5px;
}

</style>
</head>

<body>

<div class="panel">

<h1>MONOLITO GPT PRO</h1>

<button onclick="mostrar('panelPrincipal')">Panel principal</button>

<div id="panelPrincipal">

<button onclick="mostrar('panelArticulos')">Artículos</button>
<button>Pedidos</button>
<button>Proveedores</button>
<button>Ventas</button>
<button>Diario</button>

</div>

<div id="panelArticulos" style="display:none">

<button onclick="volver()">← Volver</button>

<h2>Nuevo artículo</h2>

<input id="nombre" placeholder="Nombre del artículo">
<input id="precio" placeholder="Precio">

<button class="activo" onclick="guardar()">Guardar artículo</button>

<div id="lista"></div>

</div>

</div>

<script>

let articulos = JSON.parse(localStorage.getItem("articulos")) || [];

function mostrar(id){
    document.getElementById("panelPrincipal").style.display="none";
    document.getElementById("panelArticulos").style.display="none";
    document.getElementById(id).style.display="block";
}

function volver(){
    mostrar("panelPrincipal");
}

function guardar(){

    let nombre=document.getElementById("nombre").value;
    let precio=document.getElementById("precio").value;

    if(nombre=="") return;

    articulos.push({
        nombre:nombre,
        precio:precio
    });

    localStorage.setItem("articulos",JSON.stringify(articulos));

    document.getElementById("nombre").value="";
    document.getElementById("precio").value="";

    mostrarLista();
}

function mostrarLista(){

    let lista=document.getElementById("lista");

    lista.innerHTML="";

    articulos.forEach(a=>{
        lista.innerHTML+=
        "<div class='item'>"+a.nombre+" - "+a.precio+" €</div>";
    });

}

mostrarLista();

</script>

</body>
</html>
