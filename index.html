 <!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>MONOLITO</title>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  getDocs,
  onSnapshot
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";


const firebaseConfig = {
  apiKey: "AIzaSyAxbU-eWFeKfBSMfwq8sJikpnbE8sOtr-s",
  authDomain: "monolito-ed87d.firebaseapp.com",
  projectId: "monolito-ed87d",
  storageBucket: "monolito-ed87d.firebasestorage.app",
  messagingSenderId: "737849584362",
  appId: "1:737849584362:web:3d1821bedcd64080cf8593"
};


const app = initializeApp(firebaseConfig);
const db = getFirestore(app);


window.guardarArticulo = async function() {

  const nombre = document.getElementById("nombre").value;

  if(nombre == "") return;

  await addDoc(collection(db, "articulos"), {
    nombre: nombre,
    fecha: new Date()
  });

  document.getElementById("nombre").value = "";

};


// MOSTRAR EN TIEMPO REAL

onSnapshot(collection(db, "articulos"), (snapshot) => {

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  snapshot.forEach(doc => {

    const div = document.createElement("div");
    div.textContent = doc.data().nombre;
    lista.appendChild(div);

  });

});

</script>

<style>

body {
  font-family: Arial;
  padding: 20px;
}

input {
  font-size: 20px;
  padding: 10px;
}

button {
  font-size: 20px;
  padding: 10px;
}

</style>

</head>

<body>

<h1>Artículos</h1>

<input id="nombre" placeholder="Nombre artículo">
<button onclick="guardarArticulo()">Guardar</button>

<div id="lista"></div>

</body>
</html>
